apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agcms.fullname" . }}-config
  namespace: {{ include "agcms.namespace" . }}
  labels:
    {{- include "agcms.labels" . | nindent 4 }}
data:
  # Service discovery (internal cluster DNS).
  {{- range $name, $svc := .Values.services }}
  {{- if $svc.enabled }}
  {{ printf "%s_SERVICE_URL" ($name | upper) | quote }}: {{ printf "http://%s:%d" $name (int $svc.port) | quote }}
  {{- end }}
  {{- end }}
  # Static config values from values.yaml `config:` block.
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
