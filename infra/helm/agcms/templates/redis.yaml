{{- if .Values.redis.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "agcms.namespace" . }}
  labels:
    {{- include "agcms.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agcms.selectorLabels" (dict "root" . "svcName" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agcms.selectorLabels" (dict "root" . "svcName" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "agcms.namespace" . }}
  labels:
    {{- include "agcms.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "agcms.selectorLabels" (dict "root" . "svcName" "redis") | nindent 4 }}
  ports:
    - port: 6379
      targetPort: 6379
{{- end -}}
