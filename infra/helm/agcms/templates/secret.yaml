{{- /* When secrets.external=true we skip this Secret — an ExternalSecret/SealedSecret controller is expected to produce a Secret at the same name. */ -}}
{{- if not .Values.secrets.external -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agcms.fullname" . }}-secrets
  namespace: {{ include "agcms.namespace" . }}
  labels:
    {{- include "agcms.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  AGCMS_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  AGCMS_AUDIT_HMAC_KEY: {{ .Values.secrets.auditHmacKey | quote }}
  AGCMS_ANCHOR_KEY: {{ .Values.secrets.anchorKey | quote }}
  AGCMS_KMS_LOCAL_KEY: {{ .Values.secrets.kmsLocalKey | quote }}
  WORKOS_API_KEY: {{ .Values.secrets.workosApiKey | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
{{- end -}}
