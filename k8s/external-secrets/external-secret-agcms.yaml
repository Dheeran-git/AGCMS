apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agcms-secrets
  namespace: agcms
spec:
  # The operator re-pulls this often enough to rotate within 15 min
  # without hammering the AWS API. Bump down in dev if you need
  # quicker turnaround.
  refreshInterval: 15m
  secretStoreRef:
    name: agcms-aws-sm
    kind: ClusterSecretStore
  target:
    # Recreates the legacy "agcms-secrets" Secret — no deployment
    # manifest changes required; pods read the same env keys they
    # always did.
    name: agcms-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AGCMS_SIGNING_KEY
      remoteRef:
        key: /agcms/prod/signing-key
    - secretKey: AGCMS_ANCHOR_KEY
      remoteRef:
        key: /agcms/prod/anchor-key
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: /agcms/prod/jwt-secret
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: /agcms/prod/groq-api-key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: /agcms/prod/openai-api-key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: /agcms/prod/anthropic-api-key
    - secretKey: MISTRAL_API_KEY
      remoteRef:
        key: /agcms/prod/mistral-api-key
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: /agcms/prod/postgres-password
    - secretKey: WORKOS_API_KEY
      remoteRef:
        key: /agcms/prod/workos-api-key
    - secretKey: WORKOS_CLIENT_ID
      remoteRef:
        key: /agcms/prod/workos-client-id
    - secretKey: AGCMS_KMS_LOCAL_KEY
      remoteRef:
        key: /agcms/prod/kms-local-key
