apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: agcms-aws-sm
spec:
  provider:
    aws:
      service: SecretsManager
      # IRSA: the controller's ServiceAccount has the permissions; no
      # access keys in cluster. Region must match the region where the
      # secrets actually live.
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
