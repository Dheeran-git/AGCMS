apiVersion: apps/v1
kind: Deployment
metadata:
  name: pii
  namespace: agcms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pii
  template:
    metadata:
      labels:
        app: pii
    spec:
      containers:
        - name: pii
          image: ghcr.io/OWNER/REPO/agcms-pii:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: agcms-config
          resources:
            requests:
              memory: "384Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pii
  namespace: agcms
spec:
  selector:
    app: pii
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pii-hpa
  namespace: agcms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pii
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
