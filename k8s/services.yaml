# Dashboard (React SPA served via nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: agcms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/OWNER/REPO/agcms-dashboard:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: agcms
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
