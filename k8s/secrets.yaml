# ----------------------------------------------------------------------------
# AGCMS in-cluster Secret — DEV / DEMO ONLY.
#
# In production we do NOT apply this file. Instead:
#   * EKS / cloud: use External Secrets Operator — see
#     k8s/external-secrets/ for the ClusterSecretStore + ExternalSecret
#     that materialise `agcms-secrets` from AWS Secrets Manager.
#   * GitOps / on-prem: use Sealed Secrets — see k8s/sealed-secrets/.
#
# This plain Secret is kept for `kubectl apply -f k8s/` on a throwaway
# local cluster (kind / minikube). Replace every placeholder below
# BEFORE applying, and never commit the resulting file with real values.
#
# Quickest prod-like path is to skip applying this file and use:
#
#   kubectl create secret generic agcms-secrets --namespace=agcms \
#     --from-literal=AGCMS_SIGNING_KEY="$(python -c 'import secrets; print(secrets.token_hex(32))')" \
#     --from-literal=JWT_SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')" \
#     --from-literal=GROQ_API_KEY="$GROQ_API_KEY" \
#     --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
#     --dry-run=client -o yaml | kubectl apply -f -
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: agcms-secrets
  namespace: agcms
  annotations:
    # Warn human reviewers that this file is unsafe for prod.
    agcms.example.com/secret-origin: "dev-placeholder"
type: Opaque
stringData:
  AGCMS_SIGNING_KEY: "REPLACE_WITH_RANDOM_256BIT_KEY"
  AGCMS_ANCHOR_KEY: "REPLACE_WITH_RANDOM_256BIT_KEY"
  JWT_SECRET_KEY: "REPLACE_WITH_RANDOM_256BIT_KEY"
  GROQ_API_KEY: "REPLACE_WITH_REAL_GROQ_API_KEY"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  MISTRAL_API_KEY: ""
  WORKOS_API_KEY: ""
  WORKOS_CLIENT_ID: ""
  AGCMS_KMS_LOCAL_KEY: "REPLACE_WITH_32_BYTE_BASE64_KEY"
