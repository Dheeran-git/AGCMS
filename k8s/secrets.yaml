# NOTE: Replace placeholder values with base64-encoded real secrets before applying.
# Generate: echo -n "your-secret" | base64
#
# Apply via CI: kubectl create secret generic agcms-secrets \
#   --from-literal=GROQ_API_KEY="$GROQ_API_KEY" \
#   --from-literal=JWT_SECRET_KEY="$JWT_SECRET_KEY" \
#   --from-literal=AGCMS_SIGNING_KEY="$AGCMS_SIGNING_KEY" \
#   --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
#   --namespace=agcms --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: agcms-secrets
  namespace: agcms
type: Opaque
stringData:
  GROQ_API_KEY: "REPLACE_WITH_REAL_GROQ_API_KEY"
  JWT_SECRET_KEY: "REPLACE_WITH_RANDOM_256BIT_KEY"
  AGCMS_SIGNING_KEY: "REPLACE_WITH_RANDOM_256BIT_KEY"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  MISTRAL_API_KEY: ""
