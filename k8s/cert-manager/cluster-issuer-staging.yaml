apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Let's Encrypt staging endpoint — not rate-limited, issues untrusted
    # certs. Use this while testing the ingress / DNS wiring.
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # TODO: replace with the tenant-admin / on-call email address.
    email: ops@agcms.example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      # HTTP-01 via nginx ingress. Works out of the box when the
      # ingress-nginx controller is in the cluster.
      - http01:
          ingress:
            class: nginx
