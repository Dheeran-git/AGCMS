  /api/v1/tenant/sso:
    get:
      tags:
      - management
      summary: Tenant Sso Get
      description: Return the caller tenant's SSO configuration.
      operationId: tenant_sso_get_api_v1_tenant_sso_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
