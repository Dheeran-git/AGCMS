openapi: 3.1.0
info:
  title: AGCMS Gateway API
  description: "AI Governance & Compliance Monitoring System \u2014 public API surface.\
    \ Cryptographically signed audit, multi-tenant RBAC, OpenAI-compatible ingest\
    \ at /v1/chat/completions."
  version: 1.0.0
  contact:
    name: AGCMS
    url: https://agcms.com
    email: support@agcms.com
  license:
    name: Commercial
    url: https://agcms.com/legal
paths:
  /api/dashboard/stats:
    get:
      tags:
      - dashboard
      summary: Get Stats
      description: Return aggregate stats for the overview dashboard.
      operationId: get_stats_api_dashboard_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/dashboard/violations:
    get:
      tags:
      - dashboard
      summary: Get Violations
      description: Return recent violations for the violations page.
      operationId: get_violations_api_dashboard_violations_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/dashboard/timeline:
    get:
      tags:
      - dashboard
      summary: Get Timeline
      description: Return hourly request counts for the chart.
      operationId: get_timeline_api_dashboard_timeline_get
      parameters:
      - name: hours
        in: query
        required: false
        schema:
          type: integer
          default: 24
          title: Hours
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/dashboard/playground/chat:
    post:
      tags:
      - dashboard
      summary: Playground Chat
      description: Run the 13-step governance lifecycle and return full metadata.
      operationId: playground_chat_api_dashboard_playground_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaygroundChatRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/token:
    post:
      tags:
      - management
      summary: Auth Token
      description: "Proxy api_key \u2192 access+refresh tokens to the auth service."
      operationId: auth_token_api_v1_auth_token_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - management
      summary: Auth Refresh
      description: "Proxy refresh_token \u2192 new access token."
      operationId: auth_refresh_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - management
      summary: Auth Me
      description: Proxy the Authorization header to the auth service /v1/auth/me.
      operationId: auth_me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/audit/logs:
    get:
      tags:
      - management
      summary: List Audit Logs
      description: List audit logs for the caller's tenant, newest first.
      operationId: list_audit_logs_api_v1_audit_logs_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: action
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Action
      - name: start
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Start
      - name: end
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: End
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/logs/{interaction_id}:
    get:
      tags:
      - management
      summary: Get Audit Log
      description: Fetch a single audit log entry by interaction_id.
      operationId: get_audit_log_api_v1_audit_logs__interaction_id__get
      parameters:
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
          title: Interaction Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/export:
    get:
      tags:
      - management
      summary: Export Audit Logs
      description: Export audit logs for the tenant as JSON or CSV.
      operationId: export_audit_logs_api_v1_audit_export_get
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          pattern: ^(json|csv)$
          default: json
          title: Format
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 10000
          minimum: 1
          default: 1000
          title: Limit
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/verify/{interaction_id}:
    post:
      tags:
      - management
      summary: Verify Audit Log
      description: Verify the HMAC signature of an audit log entry (via audit service).
      operationId: verify_audit_log_api_v1_audit_verify__interaction_id__post
      parameters:
      - name: interaction_id
        in: path
        required: true
        schema:
          type: string
          title: Interaction Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/policy:
    get:
      tags:
      - management
      summary: Get Active Policy
      description: Return the active policy for the caller's tenant.
      operationId: get_active_policy_api_v1_policy_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - management
      summary: Update Policy
      description: Replace the active policy for the tenant with a new version (bumped
        patch).
      operationId: update_policy_api_v1_policy_put
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/policy/versions:
    get:
      tags:
      - management
      summary: List Policy Versions
      description: List all policy versions for the tenant, newest first.
      operationId: list_policy_versions_api_v1_policy_versions_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/policy/packs:
    get:
      tags:
      - management
      summary: List Policy Packs
      description: List installed policy packs (HIPAA, GDPR, EU AI Act, NIST AI RMF,
        SOC 2, PCI DSS).
      operationId: list_policy_packs_api_v1_policy_packs_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/policy/packs/{pack_id}:
    get:
      tags:
      - management
      summary: Get Policy Pack
      description: Return one pack's full definition (overrides + rules + citations).
      operationId: get_policy_pack_api_v1_policy_packs__pack_id__get
      parameters:
      - name: pack_id
        in: path
        required: true
        schema:
          type: string
          title: Pack Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users:
    get:
      tags:
      - management
      summary: List Users
      description: List tenant users for the caller's tenant.
      operationId: list_users_api_v1_users_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - management
      summary: Create User
      description: Create a new tenant user.
      operationId: create_user_api_v1_users_post
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{user_id}:
    delete:
      tags:
      - management
      summary: Delete User
      description: Soft-delete a tenant user by setting is_active=FALSE.
      operationId: delete_user_api_v1_users__user_id__delete
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/escalations:
    get:
      tags:
      - management
      summary: List Escalations
      description: List escalations for the tenant, optionally filtered by status.
      operationId: list_escalations_api_v1_escalations_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/escalations/{escalation_id}:
    put:
      tags:
      - management
      summary: Update Escalation
      description: Update an escalation's status and notes.
      operationId: update_escalation_api_v1_escalations__escalation_id__put
      parameters:
      - name: escalation_id
        in: path
        required: true
        schema:
          type: string
          title: Escalation Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalationUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/escalations/{escalation_id}/acknowledge:
    post:
      tags:
      - management
      summary: Acknowledge Escalation
      description: Mark an escalation acknowledged by the current user. Idempotent.
      operationId: acknowledge_escalation_api_v1_escalations__escalation_id__acknowledge_post
      parameters:
      - name: escalation_id
        in: path
        required: true
        schema:
          type: string
          title: Escalation Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalationAcknowledge'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/escalations/{escalation_id}/assign:
    post:
      tags:
      - management
      summary: Assign Escalation
      description: Assign (or unassign) an escalation to a tenant user.
      operationId: assign_escalation_api_v1_escalations__escalation_id__assign_post
      parameters:
      - name: escalation_id
        in: path
        required: true
        schema:
          type: string
          title: Escalation Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalationAssign'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/escalations/{escalation_id}/resolve:
    post:
      tags:
      - management
      summary: Resolve Escalation
      description: Mark an escalation resolved with mandatory resolution notes.
      operationId: resolve_escalation_api_v1_escalations__escalation_id__resolve_post
      parameters:
      - name: escalation_id
        in: path
        required: true
        schema:
          type: string
          title: Escalation Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalationResolve'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
