      - management
      summary: Stats Overview
      description: 24h totals for the caller's tenant.
      operationId: stats_overview_api_v1_stats_overview_get
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
