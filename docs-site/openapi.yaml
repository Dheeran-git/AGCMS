components:
  schemas:
    ChangelogEntry:
      properties:
        version:
          type: string
          title: Version
        date:
          anyOf:
          - type: string
          - type: 'null'
          title: Date
        sections:
          items:
            $ref: '#/components/schemas/ChangelogSection'
          type: array
          title: Sections
      type: object
      required:
      - version
      - date
      - sections
      title: ChangelogEntry
    ChangelogSection:
      properties:
        label:
          type: string
          title: Label
        items:
          items:
            type: string
          type: array
          title: Items
      type: object
      required:
      - label
      - items
      title: ChangelogSection
    EscalationAcknowledge:
      properties:
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
      type: object
      title: EscalationAcknowledge
    EscalationAssign:
      properties:
        assignee_user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Assignee User Id
      type: object
      title: EscalationAssign
    EscalationResolve:
      properties:
        resolution_notes:
          type: string
          minLength: 1
          title: Resolution Notes
      type: object
      required:
      - resolution_notes
      title: EscalationResolve
    EscalationUpdate:
      properties:
        status:
          type: string
          pattern: ^(PENDING|REVIEWED|DISMISSED|ACTIONED)$
          title: Status
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
      type: object
      required:
      - status
      title: EscalationUpdate
    FirstCallStep:
      properties:
        interaction_id:
          type: string
          title: Interaction Id
      type: object
      required:
      - interaction_id
      title: FirstCallStep
    FrameworksStep:
      properties:
        selected:
          items:
            type: string
          type: array
          minItems: 1
          title: Selected
      type: object
      required:
      - selected
      title: FrameworksStep
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PlaygroundChatRequest:
      properties:
        message:
          type: string
          title: Message
      type: object
      required:
      - message
      title: PlaygroundChatRequest
    PolicyPacksStep:
      properties:
        packs:
          items:
            type: string
          type: array
          minItems: 1
          title: Packs
      type: object
      required:
      - packs
      title: PolicyPacksStep
    PolicyUpdate:
      properties:
        config:
          additionalProperties: true
          type: object
          title: Config
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
      type: object
      required:
      - config
      title: PolicyUpdate
    ProviderCreate:
      properties:
        kind:
          type: string
          title: Kind
          description: One of slack/pagerduty/webhook/email/splunk_hec
        name:
          type: string
          title: Name
        config:
          additionalProperties: true
          type: object
          title: Config
        enabled:
          type: boolean
          title: Enabled
          default: true
      type: object
      required:
      - kind
      - name
      title: ProviderCreate
    PurgeDecision:
      properties:
        note:
          anyOf:
          - type: string
            maxLength: 2000
          - type: 'null'
          title: Note
      type: object
      title: PurgeDecision
    PurgeRequestCreate:
      properties:
        subject_user_id:
          type: string
          maxLength: 256
          minLength: 1
          title: Subject User Id
        reason:
          type: string
          maxLength: 2000
          minLength: 10
          title: Reason
      type: object
      required:
      - subject_user_id
      - reason
      title: PurgeRequestCreate
    RefreshRequest:
      properties:
        refresh_token:
          type: string
          title: Refresh Token
      type: object
      required:
      - refresh_token
      title: RefreshRequest
    RotationProposeBody:
      properties:
        purpose:
          type: string
          pattern: ^(row|anchor)$
          title: Purpose
        new_kid:
          type: string
          title: New Kid
        new_key_material:
          type: string
          minLength: 32
          title: New Key Material
        reason:
          type: string
          minLength: 1
          title: Reason
      type: object
      required:
      - purpose
      - new_kid
      - new_key_material
      - reason
      title: RotationProposeBody
    RuleCreate:
      properties:
        provider_id:
          type: string
          title: Provider Id
        trigger_event:
          type: string
          title: Trigger Event
        severity_min:
          type: string
          title: Severity Min
          default: info
        enabled:
          type: boolean
          title: Enabled
          default: true
      type: object
      required:
      - provider_id
      - trigger_event
      title: RuleCreate
    TenantProfileStep:
      properties:
        industry:
          type: string
          title: Industry
        company_size:
          type: string
          title: Company Size
        region:
          type: string
          title: Region
      type: object
      required:
      - industry
      - company_size
      - region
      title: TenantProfileStep
    TokenRequest:
      properties:
        api_key:
          type: string
          title: Api Key
      type: object
      required:
      - api_key
      title: TokenRequest
    UserCreate:
      properties:
        external_id:
          type: string
          maxLength: 256
          minLength: 1
          title: External Id
        email:
          anyOf:
          - type: string
            maxLength: 256
          - type: 'null'
          title: Email
        role:
          type: string
          pattern: ^(admin|compliance|user)$
          title: Role
        department:
          anyOf:
          - type: string
            maxLength: 128
          - type: 'null'
          title: Department
      type: object
      required:
      - external_id
      - role
      title: UserCreate
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
servers:
- url: http://localhost:8000
  description: AGCMS gateway
