# SOC 2 Common Criteria policy pack — AGCMS v1
#
# Aligns AGCMS enforcement with the AICPA Trust Services Criteria
# Common Criteria (CC1–CC9). The wedge criteria for AI governance
# are CC6.1 (logical access), CC7.2 (system monitoring), and
# CC8.1 (change management of security config) — which maps
# cleanly onto AGCMS policy enforcement + audit chain.

id: soc2-cc
name: "SOC 2 — Common Criteria (Trust Services)"
framework: "SOC_2"
version: "1.0.0"
description: >
  Maps AGCMS controls to the Common Criteria. Paired with Phase 5
  tamper-evident audit + Phase 6 SSO/MFA/encryption, this pack
  satisfies the bulk of CC6-CC8 for AI traffic going through the
  gateway.

metadata:
  framework_citations:
    - id: "SOC 2 CC6.1"
      title: "The entity implements logical access security software, infrastructure, and architectures."
      url: "https://www.aicpa-cima.com/topic/audit-assurance/audit-and-assurance-greater-than-soc-2"
    - id: "SOC 2 CC6.6"
      title: "The entity implements logical access security measures to protect against threats from sources outside its system boundaries."
      url: "https://www.aicpa-cima.com/topic/audit-assurance/audit-and-assurance-greater-than-soc-2"
    - id: "SOC 2 CC7.2"
      title: "The entity monitors system components and the operation of those components for anomalies."
      url: "https://www.aicpa-cima.com/topic/audit-assurance/audit-and-assurance-greater-than-soc-2"
    - id: "SOC 2 CC7.3"
      title: "The entity evaluates security events to determine whether they could or have resulted in a failure."
      url: "https://www.aicpa-cima.com/topic/audit-assurance/audit-and-assurance-greater-than-soc-2"
    - id: "SOC 2 CC8.1"
      title: "The entity authorizes, designs, develops, tests, approves, and implements changes to infrastructure, data, software, and procedures to meet its objectives."
      url: "https://www.aicpa-cima.com/topic/audit-assurance/audit-and-assurance-greater-than-soc-2"

overrides:
  pii:
    enabled: true
    action_on_detection: "REDACT"
    critical_action: "BLOCK"
    risk_threshold: "MEDIUM"
  injection:
    enabled: true
    block_threshold: 0.65
    action_on_detection: "BLOCK"
    log_all_attempts: true
  audit:
    retention_days: 365

rules:
  - id: "soc2-anomaly-detection"
    description: "Injection events are treated as anomalies and escalated (CC7.2)."
    when:
      injection_score_at_least: 0.65
    action: "ESCALATE"
    framework_citations: ["SOC 2 CC7.2", "SOC 2 CC7.3"]
  - id: "soc2-external-threat"
    description: "Prompt-injection is an external threat — log and block (CC6.6)."
    when:
      injection_detected: true
    action: "BLOCK"
    framework_citations: ["SOC 2 CC6.6"]
  - id: "soc2-access-control"
    description: "Every interaction is tied to an authenticated principal (CC6.1)."
    when:
      any: true
    action: "LOG"
    framework_citations: ["SOC 2 CC6.1"]
