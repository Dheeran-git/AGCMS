services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agcms
      POSTGRES_USER: agcms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/run-migrations.sh:/docker-entrypoint-initdb.d/99-run-migrations.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agcms -d agcms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-secret} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: agcms-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://agcms:${POSTGRES_PASSWORD:-secret}@postgres:5432/agcms
      - REDIS_URL=redis://:${REDIS_PASSWORD:-secret}@redis:6379
      - AGCMS_SIGNING_KEY=${AGCMS_SIGNING_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-change-me}
      # LLM providers (all free-tier)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - AGCMS_DEFAULT_PROVIDER=${AGCMS_DEFAULT_PROVIDER:-groq}
      - PII_SERVICE_URL=http://pii:8001
      - INJECTION_SERVICE_URL=http://injection:8002
      - RESPONSE_SERVICE_URL=http://response:8003
      - POLICY_SERVICE_URL=http://policy:8004
      - AUDIT_SERVICE_URL=http://audit:8005
      - AUTH_SERVICE_URL=http://auth:8006
      - TENANT_SERVICE_URL=http://tenant:8007
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pii:
    build:
      context: .
      dockerfile: agcms-pii/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - AGCMS_SPACY_MODEL=${AGCMS_SPACY_MODEL:-en_core_web_sm}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  injection:
    build:
      context: .
      dockerfile: agcms-injection/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - AGCMS_ML_ENABLED=${AGCMS_ML_ENABLED:-true}
    mem_limit: 1536m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  response:
    build:
      context: .
      dockerfile: agcms-response/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - PII_SERVICE_URL=http://pii:8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  policy:
    build:
      context: .
      dockerfile: agcms-policy/Dockerfile
    ports:
      - "8004:8004"
    volumes:
      - ./policies:/app/policies:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  audit:
    build:
      context: .
      dockerfile: agcms-audit/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://agcms:${POSTGRES_PASSWORD:-secret}@postgres:5432/agcms
      - AGCMS_SIGNING_KEY=${AGCMS_SIGNING_KEY}
      - AGCMS_ANCHOR_KEY=${AGCMS_ANCHOR_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth:
    build:
      context: .
      dockerfile: agcms-auth/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://agcms:${POSTGRES_PASSWORD:-secret}@postgres:5432/agcms
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-change-me}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-secret}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  tenant:
    build:
      context: .
      dockerfile: agcms-tenant/Dockerfile
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://agcms:${POSTGRES_PASSWORD:-secret}@postgres:5432/agcms
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-change-me}
      - AGCMS_KMS_BACKEND=${AGCMS_KMS_BACKEND:-local}
      - AGCMS_KMS_LOCAL_KEY=${AGCMS_KMS_LOCAL_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build: ./agcms-dashboard
    ports:
      - "3000:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
