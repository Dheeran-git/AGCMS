name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Unit tests (no Docker needed)
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install \
            pytest==8.1.1 \
            pytest-asyncio==0.23.6 \
            pytest-cov==5.0.0 \
            fastapi==0.110.0 \
            databases[asyncpg]==0.9.0 \
            sqlalchemy==2.0.29 \
            asyncpg==0.29.0 \
            httpx==0.27.0 \
            python-jose[cryptography]==3.3.0 \
            passlib[bcrypt]==1.7.4 \
            pydantic==2.6.4 \
            spacy==3.7.4 \
            onnxruntime==1.17.3

      - name: Install service packages (editable)
        run: |
          for svc in agcms-gateway agcms-pii agcms-injection agcms-response \
                     agcms-policy agcms-audit agcms-auth agcms-tenant; do
            pip install -e ./$svc --no-deps --quiet
          done

      - name: Run unit tests
        env:
          AGCMS_SIGNING_KEY: test-signing-key-for-unit-tests
          DATABASE_URL: postgresql://agcms:secret@localhost:5432/agcms
          AGCMS_ML_ENABLED: "false"
          JWT_SECRET_KEY: test-jwt-secret
        run: |
          pytest tests/unit/ -v --tb=short \
            --junitxml=unit-results.xml \
            --cov=agcms --cov-report=xml

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            unit-results.xml
            coverage.xml

  # ──────────────────────────────────────────────
  # Job 2: Integration tests (full Docker stack)
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Start all services
        run: |
          docker compose up -d --wait
        timeout-minutes: 8

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install integration test dependencies
        run: pip install httpx pytest python-jose[cryptography]

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short \
            --junitxml=integration-results.xml

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Stop services
        if: always()
        run: docker compose down -v

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-results.xml

  # ──────────────────────────────────────────────
  # Job 3: Build and push Docker images (main only)
  # ──────────────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push service images
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          TAG="${{ steps.tag.outputs.TAG }}"
          for svc in gateway pii injection response policy audit auth tenant; do
            echo "Building agcms-$svc:$TAG"
            docker build \
              -t "$REPO/agcms-$svc:$TAG" \
              -t "$REPO/agcms-$svc:latest" \
              ./agcms-$svc/
            docker push "$REPO/agcms-$svc:$TAG"
            docker push "$REPO/agcms-$svc:latest"
          done

      - name: Build and push dashboard image
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          TAG="${{ steps.tag.outputs.TAG }}"
          docker build \
            -t "$REPO/agcms-dashboard:$TAG" \
            -t "$REPO/agcms-dashboard:latest" \
            ./agcms-dashboard/
          docker push "$REPO/agcms-dashboard:$TAG"
          docker push "$REPO/agcms-dashboard:latest"
